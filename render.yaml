services:
  - type: web
    name: sharemeal-api
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm ci --only=production
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: API_URL
        value: https://shareameal-api.onrender.com
      - key: FRONTEND_URL
        value: https://share-a-meal-1p8k.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: SERVICE_TOKEN
        generateValue: true
    plan: free
    numInstances: 1
